<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="-apple-system, 'Apple SD Gothic Neo', 'Pretendard', 'Noto Sans KR', 'Malgun Gothic', sans-serif">
  <defs>
    <style>
      .canvas-bg { fill: transparent; }
      @media (prefers-color-scheme: dark) {
        .canvas-bg { fill: #ffffff; }
      }
    </style>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <marker id="arrL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect class="canvas-bg" width="100%" height="100%"/>

  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">사용자 ↔ jira-fixer 3턴 인터랙션</text>

  <!-- Actor headers -->
  <g font-size="14" font-weight="700" fill="#ffffff">
    <rect x="60" y="60" width="170" height="44" rx="10" fill="#0ea5e9"/>
    <text x="145" y="88" text-anchor="middle">사용자</text>

    <rect x="350" y="60" width="170" height="44" rx="10" fill="#6366f1"/>
    <text x="435" y="88" text-anchor="middle">jira-fixer</text>

    <rect x="640" y="60" width="140" height="44" rx="10" fill="#dc2626"/>
    <text x="710" y="88" text-anchor="middle">Jira</text>

    <rect x="810" y="60" width="140" height="44" rx="10" fill="#a855f7"/>
    <text x="880" y="88" text-anchor="middle">Figma</text>
  </g>

  <!-- Lifelines -->
  <g stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="6 4">
    <line x1="145" y1="110" x2="145" y2="700"/>
    <line x1="435" y1="110" x2="435" y2="700"/>
    <line x1="710" y1="110" x2="710" y2="700"/>
    <line x1="880" y1="110" x2="880" y2="700"/>
  </g>

  <!-- ======= TURN 1 ======= -->
  <rect x="30" y="125" width="60" height="160" rx="6" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="60" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#0ea5e9" transform="rotate(-90 60 200)">TURN 1</text>

  <!-- User → Agent -->
  <line x1="160" y1="150" x2="420" y2="150" stroke="#1f2937" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="290" y="142" text-anchor="middle" font-size="13" fill="#1f2937">"PROJ-1234 처리해줘"</text>

  <!-- Agent → Jira -->
  <line x1="450" y1="180" x2="695" y2="180" stroke="#1f2937" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="572" y="172" text-anchor="middle" font-size="12" fill="#374151">getJiraIssue (본문 + 모든 댓글)</text>

  <!-- Agent → Figma -->
  <line x1="450" y1="210" x2="865" y2="210" stroke="#1f2937" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="650" y="202" text-anchor="middle" font-size="12" fill="#374151">get_figma_data (시안 fetch)</text>

  <!-- Agent → User (계획) -->
  <line x1="420" y1="255" x2="160" y2="255" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrL)"/>
  <text x="290" y="247" text-anchor="middle" font-size="13" fill="#2563eb" font-weight="600">변경 계획서 + 승인 요청</text>

  <!-- ======= TURN 2 ======= -->
  <line x1="100" y1="305" x2="950" y2="305" stroke="#e5e7eb" stroke-width="1"/>

  <rect x="30" y="320" width="60" height="140" rx="6" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="60" y="390" text-anchor="middle" font-size="15" font-weight="700" fill="#0ea5e9" transform="rotate(-90 60 390)">TURN 2</text>

  <!-- User → Agent -->
  <line x1="160" y1="345" x2="420" y2="345" stroke="#1f2937" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="290" y="337" text-anchor="middle" font-size="13" fill="#1f2937">"진행해줘"</text>

  <!-- Agent self loop (코드 수정) -->
  <path d="M 435 375 Q 530 375 530 400 Q 530 425 435 425" fill="none" stroke="#1f2937" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="555" y="405" font-size="12" fill="#374151">Edit/Write + lint/typecheck</text>

  <!-- Agent → User (초안) -->
  <line x1="420" y1="445" x2="160" y2="445" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrL)"/>
  <text x="290" y="437" text-anchor="middle" font-size="13" fill="#2563eb" font-weight="600">Jira 댓글 초안 + 게시 승인 요청</text>

  <!-- ======= TURN 3 ======= -->
  <line x1="100" y1="480" x2="950" y2="480" stroke="#e5e7eb" stroke-width="1"/>

  <rect x="30" y="495" width="60" height="180" rx="6" fill="#ecfdf5" stroke="#10b981"/>
  <text x="60" y="585" text-anchor="middle" font-size="15" font-weight="700" fill="#10b981" transform="rotate(-90 60 585)">TURN 3</text>

  <!-- User → Agent -->
  <line x1="160" y1="520" x2="420" y2="520" stroke="#1f2937" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="290" y="512" text-anchor="middle" font-size="13" fill="#1f2937">"올려줘"</text>

  <!-- Agent → Jira (댓글) -->
  <line x1="450" y1="555" x2="695" y2="555" stroke="#1f2937" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="572" y="547" text-anchor="middle" font-size="12" fill="#374151">addCommentToJiraIssue</text>

  <!-- Agent → Jira (전환) -->
  <line x1="450" y1="590" x2="695" y2="590" stroke="#1f2937" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="572" y="582" text-anchor="middle" font-size="12" fill="#374151">transitionJiraIssue → 해결됨</text>

  <!-- Agent → User (최종 보고) -->
  <line x1="420" y1="635" x2="160" y2="635" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrL)"/>
  <text x="290" y="627" text-anchor="middle" font-size="13" fill="#059669" font-weight="700">최종 보고 (댓글 ID + 전환 상태)</text>

  <!-- Footer hint -->
  <text x="500" y="700" text-anchor="middle" font-size="11" fill="#6b7280">사용자는 단 3번만 입력: "처리해줘" → "진행해줘" → "올려줘"</text>
</svg>
